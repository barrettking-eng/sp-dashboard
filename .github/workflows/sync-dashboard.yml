name: Sync Chloe Dashboards

# Runs at 8 AM, 12 PM, and 5 PM Eastern Time.
# GitHub Actions cron uses UTC. EDT (Mar–Nov) = UTC-4, EST (Nov–Mar) = UTC-5.
# Schedules below target EDT (UTC-4) — the active offset as of this file.
# If you update this during standard time, shift each hour by +1.

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 8:00 AM EDT  (Mon–Fri)
    - cron: '0 16 * * 1-5'   # 12:00 PM EDT (Mon–Fri)
    - cron: '0 21 * * 1-5'   # 5:00 PM EDT  (Mon–Fri)
  workflow_dispatch:           # Allow one-click manual runs from the GitHub UI

jobs:
  sync:
    name: Pull Close CRM data and redeploy dashboards
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to commit updated HTML files back to main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      # ── Alpha dashboard ─────────────────────────────────────────────────────
      - name: Sync alpha dashboard
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python scripts/sync_dashboard.py

      # ── Partner dashboard ───────────────────────────────────────────────────
      - name: Sync partner dashboard
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python scripts/sync_partner_dashboard.py

      # ── Commit both HTML files if anything changed ───────────────────────────
      - name: Commit and push updated dashboards
        run: |
          git config user.name  "Dashboard Sync Bot"
          git config user.email "noreply@github.com"
          git add chloe-alpha-dashboard.html chloe-partner-dashboard.html
          if git diff --staged --quiet; then
            echo "No changes detected — skipping commit."
          else
            git commit -m "chore: auto-sync dashboards $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
